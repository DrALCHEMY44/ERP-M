enum TransactionType {
  SALE
  EXPENSE
}

enum TaskStatus {
  PENDING
  ONGOING
  COMPLETED
  LATE
}

enum TaskPriority {
  LOW
  MEDIUM
  HIGH
}

type Tenant @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  name: String!
  businessSector: String!
  location: String!
  ownerEmail: String!
  taxId: String
  logoUrl: String
  subscriptionTier: String
  createdAt: Timestamp!
}

type User @table(key: "id") {
  id: String! @default(expr: "auth.uid")
  tenantId: String!
  businessId: String!
  email: String!
  role: String!
  fullName: String
  department: String
  phoneNumber: String
  createdAt: Timestamp!
}

type Business @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  name: String!
  location: String!
  businessType: String
  region: String
  createdAt: Timestamp!
}

type Product @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  name: String!
  category: String
  quantity: Int!
  costPrice: Float
  sellingPrice: Float!
  expiryDate: Date
  lowStockLevel: Int
  createdBy: String!
  createdAt: Timestamp!
  updatedAt: Timestamp
}

type Transaction @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  type: TransactionType! # 💡 Linked to your TransactionType Enum
  amount: Float!
  date: Timestamp!
  category: String
  receiptUrl: String
  recordedBy: String!
  createdAt: Timestamp!
}

type Task @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  title: String!
  description: String
  status: TaskStatus! # 💡 Linked to your TaskStatus Enum
  priority: TaskPriority # 💡 Linked to your TaskPriority Enum
  dueDate: Timestamp!
  assignedTo: User
  createdBy: String!
  createdAt: Timestamp!
  updatedAt: Timestamp
}

type TaskComment @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  task: Task!
  user: User!
  content: String!
  createdAt: Timestamp!
}

type Employee @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  fullName: String!
  position: String!
  salary: Float
  department: String
  startDate: Date
  status: String
  createdAt: Timestamp!
}

type Customer @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  customerName: String!
  phoneNumber: String
  email: String
  createdAt: Timestamp!
}

type Supplier @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  supplierName: String!
  phoneNumber: String
  email: String
  createdAt: Timestamp!
}

type Document @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  title: String!
  documentType: String!
  fileUrl: String!
  uploadedBy: String!
  uploadedAt: Timestamp!
}

type ActivityLog @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  userId: String!
  userName: String!
  actionType: String!
  module: String!
  description: String
  recordId: String
  timestamp: Timestamp!
}

type AiQuery @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  userId: String!
  queryText: String!
  response: String
  timestamp: Timestamp!
}

type Notification @table(key: "id") {
  id: String! @default(expr: "uuidV4()")
  tenantId: String!
  businessId: String!
  userId: String!
  message: String!
  isRead: Boolean!
  createdAt: Timestamp!
}
