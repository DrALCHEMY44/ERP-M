# -----------------------------------
# Tenant Queries
# -----------------------------------
query ListTenants {
  tenants {
    id
    name
    businessSector
  }
}

# -----------------------------------
# User & Business Queries
# -----------------------------------
query ListUsers($tenantId: UUID!) {
  users(where: { tenantId: { eq: $tenantId } }) {
    id
    email
    role
  }
}

query ListBusinesses($tenantId: UUID!) {
  businesses(where: { tenantId: { eq: $tenantId } }) {
    id
    name
    location
  }
}

# -----------------------------------
# Data Queries
# -----------------------------------
query ListProducts($businessId: UUID!) {
  products(where: { businessId: { eq: $businessId } }) {
