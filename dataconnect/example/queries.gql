# -----------------------------------
# Tenant & User Queries
# -----------------------------------
query ListTenants @auth(level: USER, insecureReason: "Multi-tenant ERP") {
  tenants {
    id
    name
    businessSector
  }
}

query ListBusinesses($tenantId: String!)
@auth(level: USER, insecureReason: "Multi-tenant ERP") {
  businesses(where: { tenantId: { eq: $tenantId } }) {
    id
    name
    location
  }
}

query getUserByEmail($email: String!)
@auth(level: PUBLIC, insecureReason: "Auth lookup before login") {
  users(where: { email: { eq: $email } }) {
    id
    email
    role
    department
    phoneNumber
    createdAt
    tenantId
    businessId
    fullName
  }
}

# -----------------------------------
# Business Data Queries
# -----------------------------------
query listProductsByBusiness($tenantId: String!, $businessId: String!)
@auth(level: USER, insecureReason: "Multi-tenant ERP") {
  products(
    where: { tenantId: { eq: $tenantId }, businessId: { eq: $businessId } }
  ) {
    id
    name
    category
    quantity
    costPrice
    sellingPrice
    expiryDate
    lowStockLevel
    createdBy
    createdAt
    updatedAt
    tenantId
    businessId
  }
}

