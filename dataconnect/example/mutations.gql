# --- Tenant ---

mutation CreateTenant(
  $name: String!
  $businessSector: String!
  $location: String!
  $ownerEmail: String!
  $taxId: String
  $logoUrl: String
  $subscriptionTier: String
) @auth(level: USER, insecureReason: "Multi-tenant ERP: tenant isolation enforced at the application layer") {
  tenant_insert(data: {
    name: $name
    businessSector: $businessSector
    location: $location
    ownerEmail: $ownerEmail
    taxId: $taxId
    logoUrl: $logoUrl
    subscriptionTier: $subscriptionTier
    createdAt_expr: "request.time"
  })
}

mutation UpdateTenant(
  $id: String!
  $name: String
  $businessSector: String
  $location: String
  $ownerEmail: String
  $taxId: String
  $logoUrl: String
  $subscriptionTier: String
) @auth(level: USER, insecureReason: "Multi-tenant ERP: tenant isolation enforced at the application layer") {
  tenant_update(id: $id, data: {
    name: $name
    businessSector: $businessSector
    location: $location
    ownerEmail: $ownerEmail
    taxId: $taxId
    logoUrl: $logoUrl
    subscriptionTier: $subscriptionTier
  })
}

mutation DeleteTenant($id: String!) @auth(level: USER, insecureReason: "Multi-tenant ERP: tenant isolation enforced at the application layer") {
  tenant_delete(id: $id)
}

